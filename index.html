<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Ejemplo Api Pokemon</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <h1>Example Api Pokemon</h1>

    <main>
        <section>
            <input type="text" id="pokemonName" list="pokemonSuggestions" placeholder="Buscar Pokémon">

        <datalist id="pokemonSuggestions"></datalist>
        </section>
        <section>
            <button id="btnSearch">Buscar</button>
            <button id="btnSave">Guardar</button>
            <button id="btnRead">Leer</button>
            <!-- Boton para guardar equipo -->
            <button id="btnCapturar">Capturar</button>
        </section>

        <section id="pokemonInfo">
            <p>Pokemon Information</p>
        </section>


        <h2>Mi Equipo Pokémon</h2>
        <button id="btnVerEquipo">Ver Mi Equipo</button>

        <section id="equipoContainer" class="equipo-grid">
        </section>

    </main>
    <form action=""></form>

    <script type="module" src="js/main.js" async defer></script>
</body>
<footer>
    <p>&copy; 2026 Example Api Pokemon. All rights reserved.</p>
</footer>
</body>

</html>
